<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* TDesign Weixin 风格 */
        :root {
            --td-brand-color: #0052d9;
            --td-bg-color-container: #ffffff;
            --td-text-color-primary: rgba(0, 0, 0, 0.9);
            --td-text-color-secondary: rgba(0, 0, 0, 0.4);
            --td-border-color: #e7e7e7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Segoe UI, Arial, Roboto, 'PingFang SC', 'miui', 'Hiragino Sans GB', 'Microsoft Yahei', sans-serif;
            background-color: #f5f5f5;
        }
        .t-button {
            background-color: var(--td-brand-color);
            color: white;
            border-radius: 9999px; /* pill shape */
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            display: inline-block;
        }
        .t-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: var(--td-bg-color-container);
            border-top: 1px solid var(--td-border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .t-tab-bar__item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--td-text-color-secondary);
        }
        .t-tab-bar__item--active {
            color: var(--td-brand-color);
        }
        .t-tab-bar__icon svg {
            width: 24px;
            height: 24px;
        }
        .t-tab-bar__label {
            font-size: 10px;
        }
    </style>
</head>
<body class="flex flex-col h-full">
    <!-- 顶部导航栏 -->
    <header class="bg-white text-center py-3 border-b border-gray-200">
        <h1 class="text-lg font-semibold" style="color: var(--td-text-color-primary);">抽奖</h1>
    </header>

    <!-- 主内容区 -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="text-center">
            <h2 class="text-2xl font-bold mb-4">单人专属抽奖工具</h2>
            <p class="text-gray-500 mb-12">自定义格子抽奖，生成唯一链接</p>
            <a href="#" class="t-button">发起抽奖</a>
        </div>
    </main>

    <!-- 底部 Tab 栏 -->
    <footer class="t-tab-bar">
        <div class="t-tab-bar__item t-tab-bar__item--active">
            <div class="t-tab-bar__icon">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
            </div>
            <span class="t-tab-bar__label">首页</span>
        </div>
        <div class="t-tab-bar__item">
            <div class="t-tab-bar__icon">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
            </div>
            <span class="t-tab-bar__label">我的</span>
        </div>
    </footer>
</body>
</html>
