<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小程序原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        .iphone-container {
            width: 393px;
            height: 852px;
            border: 12px solid black;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            background-color: white;
        }
        .iphone-screen {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold text-center mb-10">小程序原型设计</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-12 justify-items-center">

        <!-- 首页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">1. 首页</h2>
            <div class="iphone-container">
                <iframe src="home.html" class="iphone-screen"></iframe>
            </div>
        </div>

        <!-- 抽奖创建页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">2. 抽奖创建页</h2>
            <div class="iphone-container">
                <iframe src="create_lottery.html" class="iphone-screen"></iframe>
            </div>
        </div>
        
        <!-- 抽奖参与页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">3. 抽奖参与页</h2>
            <div class="iphone-container">
                <iframe src="participate_lottery.html" class="iphone-screen"></iframe>
            </div>
        </div>

        <!-- "我的" 页面 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">4. "我的" 页面</h2>
            <div class="iphone-container">
                <iframe src="profile.html" class="iphone-screen"></iframe>
            </div>
        </div>

        <!-- 我发起的抽奖列表页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">5. 我发起的抽奖</h2>
            <div class="iphone-container">
                <iframe src="my_created_lotteries.html" class="iphone-screen"></iframe>
            </div>
        </div>

        <!-- 我参与的抽奖列表页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">6. 我参与的抽奖</h2>
            <div class="iphone-container">
                <iframe src="my_participated_lotteries.html" class="iphone-screen"></iframe>
            </div>
        </div>

        <!-- 开奖记录管理页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">7. 开奖记录管理</h2>
            <div class="iphone-container">
                <iframe src="drawing_records.html" class="iphone-screen"></iframe>
            </div>
        </div>
        
        <!-- 抽奖管理详情页 -->
        <div class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-semibold">8. 抽奖管理详情页</h2>
            <div class="iphone-container">
                <iframe src="manage_lottery_detail.html" class="iphone-screen"></iframe>
            </div>
        </div>

    </div>
</body>
</html>
